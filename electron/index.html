<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-elev: #f5f5f7;
        --bg-sidebar: #fafafa;
        --border: rgba(0, 0, 0, 0.08);
        --text: #1d1d1f;
        --text-muted: #86868b;
        --accent: #0071e3;
        --selected: rgba(0, 113, 227, 0.08);
        --hover: rgba(0, 0, 0, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --bg-elev: #252525;
          --bg-sidebar: #1a1a1a;
          --border: rgba(255, 255, 255, 0.08);
          --text: #f5f5f7;
          --text-muted: #8e8e93;
          --accent: #0a84ff;
          --selected: rgba(10, 132, 255, 0.15);
          --hover: rgba(255, 255, 255, 0.05);
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: 220px 260px 1fr;
        height: 100vh;
      }
      .pane {
        height: 100%;
        overflow-y: auto;
        border-right: 1px solid var(--border);
      }
      .pane:last-child { border-right: none; }
      .sidebar {
        background: var(--bg-sidebar);
        padding: 56px 8px 16px;
      }
      .list-pane {
        background: var(--bg-elev);
        padding: 56px 0 0;
      }
      .editor-pane {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        padding: 0;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        padding: 8px 12px 4px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text);
        user-select: none;
      }
      .nav-item:hover { background: var(--hover); }
      .nav-item.active { background: var(--selected); color: var(--accent); font-weight: 500; }
      .nav-item .count { margin-left: auto; color: var(--text-muted); font-size: 12px; }
      .nav-item .dot {
        width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      }
      .list-header {
        padding: 0 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .list-title {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .icon-btn {
        background: none;
        border: none;
        width: 28px; height: 28px;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
        transition: background 0.15s;
      }
      .icon-btn:hover { background: var(--hover); color: var(--text); }
      .file-item {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }
      .file-item:hover { background: var(--hover); }
      .file-item.active { background: var(--selected); }
      .file-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-meta .date { margin-right: 6px; }
      .editor-toolbar {
        height: 56px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 8px;
        -webkit-app-region: drag;
      }
      .editor-toolbar > * { -webkit-app-region: no-drag; }
      .editor-toolbar .spacer { flex: 1; }
      .title-input {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        width: 100%;
        padding: 24px 40px 8px;
        font-family: inherit;
      }
      .body-input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        padding: 8px 40px 40px;
        font-size: 15px;
        line-height: 1.6;
        font-family: inherit;
        resize: none;
        white-space: pre-wrap;
      }
      .empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 14px;
      }
      .traffic-light-pad { height: 28px; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
      .pane:hover ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="pane sidebar" id="sidebar"></aside>
      <section class="pane list-pane">
        <div class="traffic-light-pad"></div>
        <div class="list-header">
          <div class="list-title" id="listTitle">All Notes</div>
          <button class="icon-btn" id="newBtn" title="New note">+</button>
        </div>
        <div id="fileList"></div>
      </section>
      <section class="pane editor-pane" id="editorPane">
        <div class="editor-toolbar">
          <div class="spacer"></div>
          <button class="icon-btn" id="revealBtn" title="Reveal in Finder">⤴</button>
          <button class="icon-btn" id="deleteBtn" title="Delete">×</button>
        </div>
        <div id="editorContent" class="empty">Select a note</div>
      </section>
    </div>

    <script>
      const CATEGORIES = [
        { id: "Work", name: "Work", color: "#0071e3" },
        { id: "Hobbies", name: "Hobbies", color: "#34c759" },
        { id: "Shopping", name: "Shopping", color: "#ff9500" },
      ];

      const api = window.brainAPI;
      let notes = []; // { relPath, category, title, updatedAt, body? }
      let activeCategory = "all";
      let activeId = null; // relPath
      let saveTimer = null;
      let pending = null; // { title, body, category }

      const $ = (id) => document.getElementById(id);

      async function init() {
        await api.seedIfEmpty();
        await refresh(true);
      }

      async function refresh(selectFirst) {
        notes = await api.list();
        notes.sort((a, b) => b.updatedAt - a.updatedAt);
        if (selectFirst && !activeId && notes[0]) activeId = notes[0].relPath;
        if (activeId && !notes.find(n => n.relPath === activeId)) activeId = notes[0]?.relPath || null;
        await render();
      }

      function renderSidebar() {
        const counts = { all: notes.length };
        CATEGORIES.forEach(c => counts[c.id] = notes.filter(n => n.category === c.id).length);
        const html = `
          <div class="section-label">Library</div>
          <div class="nav-item ${activeCategory === 'all' ? 'active' : ''}" data-cat="all">
            <span class="dot" style="background:#8e8e93"></span>
            <span>All Notes</span>
            <span class="count">${counts.all}</span>
          </div>
          <div class="section-label" style="margin-top:12px">Categories</div>
          ${CATEGORIES.map(c => `
            <div class="nav-item ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}">
              <span class="dot" style="background:${c.color}"></span>
              <span>${c.name}</span>
              <span class="count">${counts[c.id] || 0}</span>
            </div>`).join("")}
        `;
        $("sidebar").innerHTML = html;
        $("sidebar").querySelectorAll(".nav-item").forEach(el => {
          el.onclick = () => { activeCategory = el.dataset.cat; render(); };
        });
      }

      function visibleNotes() {
        const list = activeCategory === "all" ? notes : notes.filter(n => n.category === activeCategory);
        return [...list].sort((a, b) => b.updatedAt - a.updatedAt);
      }

      function renderList() {
        const list = visibleNotes();
        $("listTitle").textContent = activeCategory === "all"
          ? "All Notes"
          : CATEGORIES.find(c => c.id === activeCategory).name;
        $("fileList").innerHTML = list.map(n => {
          const date = new Date(n.updatedAt);
          const dateStr = date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
          return `
            <div class="file-item ${n.relPath === activeId ? 'active' : ''}" data-id="${escapeHtml(n.relPath)}">
              <div class="file-name">${escapeHtml(n.title || "Untitled")}</div>
              <div class="file-meta"><span class="date">${dateStr}</span>${escapeHtml(n.category)}</div>
            </div>`;
        }).join("");
        $("fileList").querySelectorAll(".file-item").forEach(el => {
          el.onclick = async () => { await flushPending(); activeId = el.dataset.id; render(); };
        });
      }

      async function renderEditor() {
        const note = notes.find(n => n.relPath === activeId);
        const pane = $("editorContent");
        if (!note) {
          pane.className = "empty";
          pane.textContent = "Select a note";
          return;
        }
        let body = note.body;
        if (body === undefined) {
          body = await api.read(note.relPath);
          note.body = body;
        }
        pane.className = "";
        pane.style.display = "flex";
        pane.style.flexDirection = "column";
        pane.style.flex = "1";
        pane.style.minHeight = "0";
        pane.innerHTML = `
          <input class="title-input" id="titleInput" value="${escapeHtml(note.title)}" placeholder="Title" />
          <textarea class="body-input" id="bodyInput" placeholder="Start writing…">${escapeHtml(body)}</textarea>
        `;
        $("titleInput").oninput = (e) => queueSave({ title: e.target.value });
        $("bodyInput").oninput = (e) => queueSave({ body: e.target.value });
      }

      function queueSave(patch) {
        const note = notes.find(n => n.relPath === activeId);
        if (!note) return;
        pending = { ...(pending || {}), ...patch, _for: activeId };
        if (patch.body !== undefined) note.body = patch.body;
        if (patch.title !== undefined) note.title = patch.title;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(flushPending, 500);
      }

      async function flushPending() {
        clearTimeout(saveTimer);
        if (!pending) return;
        const p = pending; pending = null;
        const note = notes.find(n => n.relPath === p._for);
        if (!note) return;
        try {
          if (p.body !== undefined) {
            await api.write(note.relPath, note.body || "");
          }
          if (p.title !== undefined && p.title !== note.title.slice(0, 0) /* always */) {
            const res = await api.rename(note.relPath, note.title, note.category);
            if (res.relPath !== note.relPath) {
              if (activeId === note.relPath) activeId = res.relPath;
              note.relPath = res.relPath;
              note.title = res.title;
            }
          }
          note.updatedAt = Date.now();
          renderSidebar();
          renderList();
        } catch (err) {
          console.error("save failed", err);
        }
      }

      async function newNote() {
        await flushPending();
        const cat = activeCategory === "all" ? "Work" : activeCategory;
        const res = await api.create(cat, "Untitled", "");
        await refresh();
        activeId = res.relPath;
        await render();
        setTimeout(() => { const t = $("titleInput"); if (t) { t.focus(); t.select(); } }, 0);
      }

      async function deleteNote() {
        if (!activeId) return;
        const id = activeId;
        pending = null;
        clearTimeout(saveTimer);
        await api.remove(id);
        notes = notes.filter(n => n.relPath !== id);
        activeId = visibleNotes()[0]?.relPath || null;
        await render();
      }

      async function reveal() {
        await api.reveal(activeId || "");
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      async function render() { renderSidebar(); renderList(); await renderEditor(); }

      $("newBtn").onclick = newNote;
      $("deleteBtn").onclick = deleteNote;
      $("revealBtn").onclick = reveal;
      window.addEventListener("beforeunload", () => { flushPending(); });
      init();
    </script>
  </body>
</html>
