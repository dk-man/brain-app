<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
          system-ui, sans-serif;
        background: #0b0b0f;
        color: #f5f5f7;
      }
      main {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0;
      }
      p {
        margin-top: 1rem;
        color: #a1a1aa;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Hello, World <span aria-hidden="true">👋</span></h1>
        <p>Your standalone Mac app is up and running.</p>
      </div>
    </main>
  </body>
</html>
