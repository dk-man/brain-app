<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brain</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-elev: #f5f5f7;
        --bg-sidebar: #fafafa;
        --border: rgba(0, 0, 0, 0.08);
        --text: #1d1d1f;
        --text-muted: #86868b;
        --accent: #0071e3;
        --selected: rgba(0, 113, 227, 0.08);
        --hover: rgba(0, 0, 0, 0.04);
        --menu-bg: #ffffff;
        --menu-shadow: 0 10px 30px rgba(0,0,0,0.18);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --bg-elev: #252525;
          --bg-sidebar: #1a1a1a;
          --border: rgba(255, 255, 255, 0.08);
          --text: #f5f5f7;
          --text-muted: #8e8e93;
          --accent: #0a84ff;
          --selected: rgba(10, 132, 255, 0.15);
          --hover: rgba(255, 255, 255, 0.05);
          --menu-bg: #2c2c2e;
          --menu-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: 220px 260px 1fr;
        height: 100vh;
      }
      .pane {
        height: 100%;
        overflow-y: auto;
        border-right: 1px solid var(--border);
      }
      .pane:last-child { border-right: none; }
      .sidebar {
        background: var(--bg-sidebar);
        padding: 56px 8px 16px;
        display: flex;
        flex-direction: column;
      }
      .sidebar .nav-scroll { flex: 1; min-height: 0; overflow-y: auto; }
      .sidebar .panel {
        border-top: 1px solid var(--border);
        padding: 10px 4px 4px;
        margin-top: 8px;
      }
      .list-pane {
        background: var(--bg-elev);
        padding: 56px 0 0;
      }
      .editor-pane {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        padding: 0;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        padding: 8px 12px 4px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text);
        user-select: none;
      }
      .nav-item:hover { background: var(--hover); }
      .nav-item.active { background: var(--selected); color: var(--accent); font-weight: 500; }
      .nav-item .count { margin-left: auto; color: var(--text-muted); font-size: 12px; }
      .nav-item .dot {
        width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      }
      .panel-btn {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: var(--text);
        background: none;
        border: none;
        text-align: left;
        font-family: inherit;
      }
      .panel-btn:hover { background: var(--hover); }
      .panel-btn .glyph {
        width: 16px; text-align: center; color: var(--text-muted); font-size: 13px;
      }
      .list-header {
        padding: 0 16px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .list-title {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .icon-btn {
        background: none;
        border: none;
        width: 28px; height: 28px;
        border-radius: 6px;
        cursor: pointer;
        color: var(--text-muted);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
        transition: background 0.15s;
        font-family: inherit;
      }
      .icon-btn:hover { background: var(--hover); color: var(--text); }
      .file-item {
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }
      .file-item:hover { background: var(--hover); }
      .file-item.active { background: var(--selected); }
      .file-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .file-meta .date { margin-right: 6px; }
      .editor-toolbar {
        height: 38px;
        flex-shrink: 0;
        -webkit-app-region: drag;
      }
      .title-input {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        width: 100%;
        padding: 24px 40px 8px;
        font-family: inherit;
      }
      .body-input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        padding: 8px 40px 40px;
        font-size: 15px;
        line-height: 1.6;
        font-family: inherit;
        resize: none;
        white-space: pre-wrap;
      }
      .empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 14px;
      }
      .ctx-menu {
        position: fixed;
        z-index: 1000;
        min-width: 180px;
        background: var(--menu-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--menu-shadow);
        padding: 4px;
        font-size: 13px;
      }
      .ctx-item {
        padding: 7px 12px;
        border-radius: 5px;
        cursor: pointer;
        color: var(--text);
        user-select: none;
      }
      .ctx-item:hover { background: var(--selected); color: var(--accent); }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
      .pane:hover ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="pane sidebar">
        <div class="nav-scroll" id="sidebar"></div>
        <div class="panel">
          <div class="section-label">Manage</div>
          <button class="panel-btn" id="exportBtn"><span class="glyph">↑</span><span>Export…</span></button>
          <button class="panel-btn" id="importBtn"><span class="glyph">↓</span><span>Import…</span></button>
          <button class="panel-btn" id="folderBtn"><span class="glyph">◴</span><span>Reveal Folder</span></button>
        </div>
      </aside>
      <section class="pane list-pane">
        <div class="list-header">
          <div class="list-title" id="listTitle">All Notes</div>
          <button class="icon-btn" id="newBtn" title="New note">+</button>
        </div>
        <div id="fileList"></div>
      </section>
      <section class="pane editor-pane" id="editorPane">
        <div class="editor-toolbar"></div>
        <div id="editorContent" class="empty">Select a note</div>
      </section>
    </div>

    <script>
      const CATEGORIES = [
        { id: "Work", name: "Work", color: "#0071e3" },
        { id: "Hobbies", name: "Hobbies", color: "#34c759" },
        { id: "Shopping", name: "Shopping", color: "#ff9500" },
      ];
      const TRASH = "Trash";

      const api = window.brainAPI;
      let notes = [];
      let activeCategory = "all";
      let activeId = null;
      let saveTimer = null;
      let pending = null;

      const $ = (id) => document.getElementById(id);

      async function init() {
        await api.seedIfEmpty();
        await refresh(true);
      }

      async function refresh(selectFirst) {
        notes = await api.list();
        notes.sort((a, b) => b.updatedAt - a.updatedAt);
        const vis = visibleNotes();
        if (selectFirst && !activeId && vis[0]) activeId = vis[0].relPath;
        if (activeId && !notes.find(n => n.relPath === activeId)) activeId = vis[0]?.relPath || null;
        await render();
      }

      function renderSidebar() {
        const nonTrash = notes.filter(n => n.category !== TRASH);
        const counts = { all: nonTrash.length, [TRASH]: notes.length - nonTrash.length };
        CATEGORIES.forEach(c => counts[c.id] = nonTrash.filter(n => n.category === c.id).length);
        const html = `
          <div class="section-label">Library</div>
          <div class="nav-item ${activeCategory === 'all' ? 'active' : ''}" data-cat="all">
            <span class="dot" style="background:#8e8e93"></span>
            <span>All Notes</span>
            <span class="count">${counts.all}</span>
          </div>
          <div class="section-label" style="margin-top:12px">Categories</div>
          ${CATEGORIES.map(c => `
            <div class="nav-item ${activeCategory === c.id ? 'active' : ''}" data-cat="${c.id}">
              <span class="dot" style="background:${c.color}"></span>
              <span>${c.name}</span>
              <span class="count">${counts[c.id] || 0}</span>
            </div>`).join("")}
          <div class="section-label" style="margin-top:12px">Bin</div>
          <div class="nav-item ${activeCategory === TRASH ? 'active' : ''}" data-cat="${TRASH}">
            <span class="dot" style="background:#c7c7cc"></span>
            <span>Trash</span>
            <span class="count">${counts[TRASH] || 0}</span>
          </div>
        `;
        $("sidebar").innerHTML = html;
        $("sidebar").querySelectorAll(".nav-item").forEach(el => {
          el.onclick = async () => { await flushPending(); activeCategory = el.dataset.cat; activeId = null; await refresh(true); };
        });
      }

      function visibleNotes() {
        let list;
        if (activeCategory === "all") list = notes.filter(n => n.category !== TRASH);
        else list = notes.filter(n => n.category === activeCategory);
        return [...list].sort((a, b) => b.updatedAt - a.updatedAt);
      }

      function renderList() {
        const list = visibleNotes();
        $("listTitle").textContent = activeCategory === "all"
          ? "All Notes"
          : activeCategory === TRASH ? "Trash"
          : CATEGORIES.find(c => c.id === activeCategory).name;
        $("newBtn").style.display = activeCategory === TRASH ? "none" : "";
        $("fileList").innerHTML = list.map(n => {
          const date = new Date(n.updatedAt);
          const dateStr = date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
          const meta = n.category === TRASH ? `from ${escapeHtml(n.originalCategory || "")}` : escapeHtml(n.category);
          return `
            <div class="file-item ${n.relPath === activeId ? 'active' : ''}" data-id="${escapeHtml(n.relPath)}">
              <div class="file-name">${escapeHtml(n.title || "Untitled")}</div>
              <div class="file-meta"><span class="date">${dateStr}</span>${meta}</div>
            </div>`;
        }).join("");
        $("fileList").querySelectorAll(".file-item").forEach(el => {
          el.onclick = async () => { await flushPending(); activeId = el.dataset.id; render(); };
          el.oncontextmenu = (e) => {
            e.preventDefault();
            const note = notes.find(n => n.relPath === el.dataset.id);
            if (!note) return;
            activeId = note.relPath;
            render();
            showContextMenu(e.clientX, e.clientY, note);
          };
        });
      }

      async function renderEditor() {
        const note = notes.find(n => n.relPath === activeId);
        const pane = $("editorContent");
        if (!note) {
          pane.className = "empty";
          pane.textContent = "Select a note";
          return;
        }
        let body = note.body;
        if (body === undefined) {
          body = await api.read(note.relPath);
          note.body = body;
        }
        pane.className = "";
        pane.style.display = "flex";
        pane.style.flexDirection = "column";
        pane.style.flex = "1";
        pane.style.minHeight = "0";
        const readOnly = note.category === TRASH;
        pane.innerHTML = `
          <input class="title-input" id="titleInput" value="${escapeHtml(note.title)}" placeholder="Title" ${readOnly ? "readonly" : ""} />
          <textarea class="body-input" id="bodyInput" placeholder="Start writing…" ${readOnly ? "readonly" : ""}>${escapeHtml(body)}</textarea>
        `;
        if (!readOnly) {
          $("titleInput").oninput = (e) => queueSave({ title: e.target.value });
          $("bodyInput").oninput = (e) => queueSave({ body: e.target.value });
        }
      }

      function queueSave(patch) {
        const note = notes.find(n => n.relPath === activeId);
        if (!note) return;
        pending = { ...(pending || {}), ...patch, _for: activeId };
        if (patch.body !== undefined) note.body = patch.body;
        if (patch.title !== undefined) note.title = patch.title;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(flushPending, 500);
      }

      async function flushPending() {
        clearTimeout(saveTimer);
        if (!pending) return;
        const p = pending; pending = null;
        const note = notes.find(n => n.relPath === p._for);
        if (!note) return;
        try {
          if (p.body !== undefined) {
            await api.write(note.relPath, note.body || "");
          }
          if (p.title !== undefined) {
            const res = await api.rename(note.relPath, note.title, note.category);
            if (res.relPath !== note.relPath) {
              if (activeId === note.relPath) activeId = res.relPath;
              note.relPath = res.relPath;
              note.title = res.title;
            }
          }
          note.updatedAt = Date.now();
          renderSidebar();
          renderList();
        } catch (err) {
          console.error("save failed", err);
        }
      }

      async function newNote() {
        if (activeCategory === TRASH) return;
        await flushPending();
        const cat = activeCategory === "all" ? "Work" : activeCategory;
        const res = await api.create(cat, "Untitled", "");
        await refresh();
        activeId = res.relPath;
        await render();
        setTimeout(() => { const t = $("titleInput"); if (t) { t.focus(); t.select(); } }, 0);
      }

      async function trashNote(relPath) {
        pending = null; clearTimeout(saveTimer);
        await api.trash(relPath);
        if (activeId === relPath) activeId = null;
        await refresh(true);
      }

      async function restoreNote(relPath) {
        pending = null; clearTimeout(saveTimer);
        const res = await api.restore(relPath);
        if (activeId === relPath) activeId = res.relPath;
        await refresh();
      }

      // ---- Context menu ----
      function hideContextMenu() {
        document.querySelectorAll(".ctx-menu").forEach(el => el.remove());
      }
      function showContextMenu(x, y, note) {
        hideContextMenu();
        const menu = document.createElement("div");
        menu.className = "ctx-menu";
        const items = note.category === TRASH
          ? [{ label: "Restore", action: () => restoreNote(note.relPath) }]
          : [{ label: "Move to Trash", action: () => trashNote(note.relPath) }];
        menu.innerHTML = items.map((it, i) => `<div class="ctx-item" data-i="${i}">${it.label}</div>`).join("");
        document.body.appendChild(menu);
        const rect = menu.getBoundingClientRect();
        const px = Math.min(x, window.innerWidth - rect.width - 8);
        const py = Math.min(y, window.innerHeight - rect.height - 8);
        menu.style.left = px + "px";
        menu.style.top = py + "px";
        menu.querySelectorAll(".ctx-item").forEach(el => {
          el.onclick = () => { hideContextMenu(); items[+el.dataset.i].action(); };
        });
      }
      document.addEventListener("click", hideContextMenu);
      document.addEventListener("contextmenu", (e) => {
        if (!e.target.closest(".file-item")) hideContextMenu();
      });

      async function doExport() {
        await flushPending();
        try {
          const res = await api.exportAll();
          if (res?.ok) console.log("Exported", res.count, "notes →", res.path);
        } catch (e) { console.error(e); }
      }
      async function doImport() {
        await flushPending();
        try {
          const res = await api.importAll();
          if (res?.ok) { console.log("Imported", res.count, "notes"); await refresh(); }
        } catch (e) { console.error(e); }
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      async function render() { renderSidebar(); renderList(); await renderEditor(); }

      $("newBtn").onclick = newNote;
      $("exportBtn").onclick = doExport;
      $("importBtn").onclick = doImport;
      $("folderBtn").onclick = () => api.reveal("");
      window.addEventListener("beforeunload", () => { flushPending(); });
      init();
    </script>
  </body>
</html>
